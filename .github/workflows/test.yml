name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: web/backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn[standard] python-multipart Pillow numpy pytest httpx
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu || true

      - name: Run tests
        run: python -m pytest test_app.py -v
